#################
# LOCAL CONFIGS #
#################
spring.application.name=notesAPI
#allows for .env file to be read and used in program
spring.config.import=file:.env[.properties]
#enables ProblemDetails to be used (a standardized way of communicating errors)
spring.mvc.problemdetails.enabled=true
#local db url
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/noteswebapp
#env variable
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
